name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
        env:
          # Dummy values: app routes are dynamic and don't connect at build.
          DATABASE_URL: postgresql://user:pass@localhost:5432/conduit
          DATABASE_URL_UNPOOLED: postgresql://user:pass@localhost:5432/conduit
